(function outwardBootstrap() {
  if (!Array.isArray(window.outwardRequests)) window.outwardRequests = [];
  if (!window.outwardActiveTab) window.outwardActiveTab = 'pending';
  if (!window.outwardExpandedGroups) window.outwardExpandedGroups = {};

})();

/* ---------------- Safe helpers ---------------- */
function outEl(id) { return document.getElementById(id); }

function outEsc(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(value) { return outEsc(value); }

function outNorm(value) {
  return String(value || '').trim().toLowerCase();
}

function outNormKey(value) {
  return String(value || '').trim().toUpperCase();
}

function outSetText(id, value) {
  if (typeof setText === 'function') {
    try { setText(id, value); return; } catch (e) {}
  }
  var el = outEl(id);
  if (el) el.textContent = value === null || value === undefined ? '' : String(value);
}

function outSetValue(id, value) {
  if (typeof setValue === 'function') {
    try { setValue(id, value); return; } catch (e) {}
  }
  var el = outEl(id);
  if (el) el.value = value === null || value === undefined ? '' : String(value);
}

function outGetValue(id) {
  if (typeof getValue === 'function') {
    try { return getValue(id); } catch (e) {}
  }
  var el = outEl(id);
  return el ? String(el.value || '').trim() : '';
}

function outShowLoading(show) {
  if (typeof showLoading === 'function') {
    try { showLoading(show); return; } catch (e) {}
  }
}

function outToInputDate(value) {
  if (typeof toInputDate === 'function') {
    try { return toInputDate(value); } catch (e) {}
  }
  if (!value) return '';
  if (Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value.getTime())) {
    return value.toISOString().slice(0, 10);
  }
  var s = String(value).trim();
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    var dd = ('0' + m[1]).slice(-2);
    var mm = ('0' + m[2]).slice(-2);
    var yy = m[3].length === 2 ? '20' + m[3] : m[3];
    return yy + '-' + mm + '-' + dd;
  }
  var d = new Date(s);
  return isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10);
}

function outClosest(target, selector) {
  while (target && target !== document) {
    if (target.matches && target.matches(selector)) return target;
    target = target.parentNode;
  }
  return null;
}

function getNum(v) {
  if (v === null || v === undefined || v === '') return 0;
  return Number(String(v).replace(/,/g, '')) || 0;
}

function fmtQty(v) {
  var n = Number(v) || 0;
  if (n === 0) return '-';
  return n.toLocaleString('en-IN');
}

function uniq(arr) {
  var seen = {}, out = [];
  (arr || []).forEach(function(v) {
    var raw = String(v || '').trim();
    var key = raw.toUpperCase();
    if (raw && !seen[key]) {
      seen[key] = true;
      out.push(raw);
    }
  });
  return out.sort(function(a, b) { return a.localeCompare(b); });
}

function stockSel(cur, exp) {
  return String(cur || '').toUpperCase() === String(exp || '').toUpperCase() ? ' selected' : '';
}

function getTxnId(row) { return String((row && row['Transaction_ID']) || '').trim(); }

function getOutwardGroupKey(row) {
  var txnId = getTxnId(row);
  var headPerson = String((row && row['Head_Person']) || '').trim();
  return (txnId + '|' + headPerson) || ('ROW_' + String((row && row.rowNumber) || ''));
}

function outSafeId(value) {
  var str = String(value || '');
  var hash = 0, i, chr;
  for (i = 0; i < str.length; i++) {
    chr = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + chr;
    hash |= 0;
  }
  return 'out_' + Math.abs(hash).toString(36);
}

function normalizeOutMaterialRow(row) {
  row = row || {};
  return {
    rowNumber: row.rowNumber || '',
    goodsType: String(row.goodsType || row['Goods Type'] || row['GOODS TYPE'] || '').trim(),
    mainGroup: String(row.mainGroup || row['Main Group'] || row['MAIN GROUP'] || '').trim(),
    subGroup: String(row.subGroup || row['Sub Group'] || row['SUB GROUP'] || '').trim(),
    itemName: String(row.itemName || row.goodsDescription || row['Item Name'] || row['GOODS DESCRIPTION'] || row['Goods Description'] || '').trim(),
    uom: String(row.uom || row['UOM'] || '').trim(),
    brand: String(row.brand || row['Brand'] || row['BRAND'] || '').trim(),
    model: String(row.model || row['Model'] || row['MODEL'] || '').trim()
  };
}

function setOutwardMasterData(rows) {
  window.outwardMasterData = (rows || []).map(normalizeOutMaterialRow).filter(function(row) {
    return row.mainGroup || row.subGroup || row.itemName;
  });
}

/* ---------------- Init ---------------- */
(function initOutwardEnhancements() {
  setTimeout(function() {
    ensureOutwardExtraTabs();
    ensureOutwardGroupEditModal();
    ensureOutNotifPanel();
    bindOutwardTableEvents();
    outAddClearButtons(document);
  }, 250);
})();

/* ---------------- Load ---------------- */
function loadOutwardData(options) {
  options = options || {};
  var silent = !!options.silent;
  var finish = function() {
    if (typeof options.onComplete === 'function') options.onComplete();
  };

  ensureOutwardExtraTabs();
  ensureOutwardGroupEditModal();
  bindOutwardTableEvents();

  if (!window.google || !google.script || !google.script.run) {
    console.error('google.script.run not available. This must run inside Apps Script HtmlService.');
    finish();
    return;
  }

  if (!silent) outShowLoading(true);
  google.script.run
    .withSuccessHandler(function(response) {
      window.outwardRequests = (response && response.requests) || [];
      setOutwardMasterData((response && (response.masterData || response.materialRows)) || []);
      ensureOutwardExtraTabs();
      renderOutwardStats();
      renderOutwardTable();

      if (!window.outwardMasterData.length && google.script.run.getMaterialListInitialData) {
        google.script.run
          .withSuccessHandler(function(matResponse) {
            setOutwardMasterData((matResponse && matResponse.rows) || []);
            if (!silent) outShowLoading(false);
            finish();
          })
          .withFailureHandler(function() {
            if (!silent) outShowLoading(false);
            finish();
          })
          .getMaterialListInitialData();
      } else {
        if (!silent) outShowLoading(false);
        finish();
      }
    })
    .withFailureHandler(function(error) {
      if (!silent) {
        outShowLoading(false);
        Swal.fire('Error', 'Outward data loading error: ' + ((error && error.message) || error), 'error');
      } else {
        console.warn('Outward auto refresh failed:', (error && error.message) || error);
      }
      finish();
    })
    .getOutwardData();
}

function refreshOutwardMaterialMaster(done) {
  done = done || function(){};
  if (!window.google || !google.script || !google.script.run || !google.script.run.getMaterialListInitialData) {
    done();
    return;
  }
  google.script.run
    .withSuccessHandler(function(response) {
      setOutwardMasterData((response && response.rows) || []);
      done();
    })
    .withFailureHandler(function(error) {
      console.warn('Material master load failed:', (error && error.message) || error);
      done();
    })
    .getMaterialListInitialData();
}

/* ---------------- Tabs ---------------- */
function ensureOutwardExtraTabs() {
  var pending = outEl('outPendingTab');
  var success = outEl('outSuccessTab');
  if (!pending || !success || !pending.parentElement) return;

  var box = pending.parentElement;
  if (!outEl('outReturnTab')) {
    var returnTab = document.createElement('button');
    returnTab.className = 'tab';
    returnTab.id = 'outReturnTab';
    returnTab.type = 'button';
    returnTab.textContent = 'Return';
    returnTab.setAttribute('data-outward-tab', 'return');
    box.appendChild(returnTab);
  }
  if (!outEl('outPendingPartialTab')) {
    var partialTab = document.createElement('button');
    partialTab.className = 'tab';
    partialTab.id = 'outPendingPartialTab';
    partialTab.type = 'button';
    partialTab.textContent = 'Partial';
    partialTab.setAttribute('data-outward-tab', 'partial');
    box.appendChild(partialTab);
  }

  ['outPendingTab', 'outSuccessTab'].forEach(function(id) {
    var el = outEl(id);
    if (el && !el.getAttribute('data-outward-tab')) {
      el.setAttribute('data-outward-tab', id === 'outSuccessTab' ? 'success' : 'pending');
    }
  });

  if (!box.getAttribute('data-outward-tabs-bound')) {
    box.addEventListener('click', function(e) {
      var tabBtn = outClosest(e.target, '[data-outward-tab]');
      if (!tabBtn || !box.contains(tabBtn)) return;
      switchOutwardTab(tabBtn.getAttribute('data-outward-tab'));
    });
    box.setAttribute('data-outward-tabs-bound', '1');
  }
}

function switchOutwardTab(tabName) {
  if (tabName === 'pendingPartial') tabName = 'partial';
  if (tabName !== 'pending' && tabName !== 'success' && tabName !== 'return' && tabName !== 'partial') {
    tabName = 'pending';
  }
  window.outwardActiveTab = tabName;

  ['outPendingTab', 'outSuccessTab', 'outReturnTab', 'outPendingPartialTab'].forEach(function(id) {
    var t = outEl(id);
    if (t) t.classList.remove('active');
  });

  var activeId = tabName === 'success' ? 'outSuccessTab' :
    tabName === 'return' ? 'outReturnTab' :
    tabName === 'partial' ? 'outPendingPartialTab' : 'outPendingTab';
  var active = outEl(activeId);
  if (active) active.classList.add('active');

  window.outwardExpandedGroups = {};
  renderOutwardTable();
}

/* ---------------- Status helpers ---------------- */
function outwardSheetType(row) {
  return String((row && (row['Type'] || row['TYPE'])) || '').trim().toUpperCase();
}

function outwardManualStatus(row) {
  return String((row && (row['ERP STATUS'] || row['ERP_STATUS'] || row['Manual Status'] || row['MANUAL STATUS'])) || '').trim().toUpperCase();
}

function isReturnRow(row) {
  var type = outwardSheetType(row);
  var id = String((row && row['Transaction_ID']) || '').toUpperCase();
  var dc = String((row && row['DC / MI']) || '').toUpperCase();
  return type === 'RETURNED' || type === 'RETURN' || id.indexOf('_RETURN_') !== -1 || dc === 'RETURN';
}

function getAgainstId(row) {
  return String((row && (row['Linked_Req_ID'] || row['LINKED_REQ_ID'])) || '').trim();
}

function computedStatus(row) {
  if (isReturnRow(row)) return 'RETURNED';
  var reqQty = getNum(row && row['Quantity']);
  var issueQty = getNum(row && row['Issue Qty']);
  if (reqQty > 0 && issueQty >= reqQty) return 'SUCCESS';
  if (issueQty > 0 && issueQty < reqQty) return 'PARTIAL';
  return 'PENDING';
}

function getOutwardStatus(row) {
  if (isReturnRow(row)) return 'RETURNED';
  var manual = outwardManualStatus(row);
  if (manual === 'PENDING' || manual === 'PARTIAL' || manual === 'SUCCESS') return manual;
  return computedStatus(row);
}

function groupStatus(items) {
  items = items || [];
  if (!items.length) return 'PENDING';
  var statuses = items.map(function(row) { return getOutwardStatus(row); });
  if (statuses.every(function(s) { return s === 'RETURNED'; })) return 'RETURNED';
  if (statuses.every(function(s) { return s === 'SUCCESS'; })) return 'SUCCESS';
  if (statuses.some(function(s) { return s === 'PARTIAL' || s === 'SUCCESS'; })) return 'PARTIAL';
  return 'PENDING';
}

function statusBadge(status) {
  if (status === 'RETURNED') return '<span class="badge badge-warning">RETURNED</span>';
  if (status === 'SUCCESS') return '<span class="badge badge-success">SUCCESS</span>';
  if (status === 'PARTIAL') return '<span class="badge badge-warning">PARTIAL</span>';
  return '<span class="badge badge-danger">PENDING</span>';
}

/* ---------------- Groups and filters ---------------- */
function buildGroups(rows) {
  var map = {}, groups = [];
  (rows || []).forEach(function(row) {
    var id = getOutwardGroupKey(row);
    if (!map[id]) {
      map[id] = { transactionId: id, displayTransactionId: getTxnId(row) || id, first: row, items: [] };
      groups.push(map[id]);
    }
    map[id].items.push(row);
  });
  return groups;
}

function getFilteredOutwardRows() {
  var requests = Array.isArray(window.outwardRequests) ? window.outwardRequests : [];
  if (window.outwardActiveTab === 'pendingPartial') window.outwardActiveTab = 'partial';

  var searchBox = outEl('outSearchBox');
  var issueFromFilter = outEl('outIssueFromFilter');
  var search = searchBox ? String(searchBox.value || '').toLowerCase().trim() : '';
  var issueFrom = issueFromFilter ? String(issueFromFilter.value || '').trim() : '';

  return requests.filter(function(row) {
    var status = getOutwardStatus(row);
    var isReturn = isReturnRow(row);
    var tab = window.outwardActiveTab;

    // Return タブ：RETURN 行のみ表示
    if (tab === 'return' && !isReturn) return false;
    if (tab !== 'return' && isReturn) return false;

    // Pending タブ：PENDING のみ表示
    if (tab === 'pending' && status !== 'PENDING') return false;

    // Success タブ：SUCCESS のみ表示（PENDING/PARTIAL は非表示）
    if (tab === 'success' && status !== 'SUCCESS') return false;

    // Partial タブ：PARTIAL のみ表示
    if (tab === 'partial' && status !== 'PARTIAL') return false;

    // Issue From フィルタ
    if (issueFrom && String(row['Issue From'] || '').trim() !== issueFrom) return false;

    // 検索ボックスが空ならここで終了
    if (!search) return true;

    // 検索条件
    var haystack = [
      row['Transaction_ID'], row['System_Key'], row['Type'], row['Date'], row['Location'], row['Purpose'],
      row['Head_Person'], row['Technician'], row['Asset_Reason'], row['Linked_Req_ID'], row['Goods_Type'], row['GOODS TYPE'],
      row['Main_Group'], row['MAIN GROUP'], row['Sub_Group'], row['SUB GROUP'], row['Item_Name'], row['GOODS DESCRIPTION'],
      row['Quantity'], row['UOM'], row['Issue Date'], row['Issue Qty'], row['Issue From'], row['STOCK TYPE'], row['Stock Type'],
      row['Brand'], row['Model'], row['Serial Number'], row['DC / MI'], row['ERP STATUS']
    ].join(' ').toLowerCase();
    return haystack.indexOf(search) !== -1;
  });
}

/* ---------------- Clear (X) button enhancement ---------------- */
function outAddClearButtons(root) {
  var scope = root || document;
  var fields = scope.querySelectorAll('input[type="text"], input[type="number"], input[type="date"], select');
  Array.prototype.forEach.call(fields, function(field) {
    if (field.getAttribute('data-clear-enh')) return;
    field.setAttribute('data-clear-enh', '1');
    field.classList.add('out-clearable-input');

    var parent = field.parentNode;
    if (parent) {
      var computed = window.getComputedStyle(parent);
      if (computed.position === 'static') parent.classList.add('out-clear-relative');
    }

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'out-clear-btn';
    btn.innerHTML = '&times;';
    btn.setAttribute('tabindex', '-1');
    field.insertAdjacentElement('afterend', btn);

    function refresh() {
      btn.style.display = field.value ? 'inline-flex' : 'none';
    }
    field.addEventListener('input', refresh);
    field.addEventListener('change', refresh);
    refresh();

    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      field.value = '';
      field.dispatchEvent(new Event('input', { bubbles: true }));
      field.dispatchEvent(new Event('change', { bubbles: true }));
      refresh();
      field.focus();
    });
  });
}

function outIsToday(dateValue) {
  var input = outToInputDate(dateValue);
  if (!input) return false;
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  return input === todayStr;
}

function renderOutNotifPanelList(pendingGroups) {
  var list = outEl('outNotifList');
  if (!list) return;

  var todayGroups = (pendingGroups || []).filter(function(g) {
    return outIsToday(g.first && g.first['Date']);
  });

  if (!todayGroups.length) {
    list.innerHTML = '<div class="out-notif-empty">Aaj koi naya pending transaction nahi hai.</div>';
    return;
  }

  todayGroups.sort(function(a, b) {
    var aMax = Math.max.apply(null, (a.items || []).map(function(r) { return Number(r.rowNumber) || 0; }).concat([0]));
    var bMax = Math.max.apply(null, (b.items || []).map(function(r) { return Number(r.rowNumber) || 0; }).concat([0]));
    return bMax - aMax;
  });

  list.innerHTML = todayGroups.map(function(g) {
    var first = g.first || {};
    var count = (g.items || []).length;
    return '<div class="out-notif-item" data-txn-id="' + escAttr(g.transactionId) + '">' +
      '<b>' + outEsc(getTxnId(first) || g.transactionId) + '</b>' +
      '<span>' + outEsc(first['Head_Person']) + ' - ' + count + ' item' + (count > 1 ? 's' : '') + ' - ' + outEsc(first['Location']) + '</span>' +

  }).join('');

function renderOutwardStats() {
  var requests = Array.isArray(window.outwardRequests) ? window.outwardRequests : [];
  var normal = requests.filter(function(row) { return !isReturnRow(row); });
  var normalGroups = buildGroups(normal).filter(function(g) { return g.transactionId; });
  var pendingGroups = normalGroups.filter(function(g) { return groupStatus(g.items) === 'PENDING'; });
  var successGroups = normalGroups.filter(function(g) { return groupStatus(g.items) === 'SUCCESS'; });
  var partialGroups = normalGroups.filter(function(g) { return groupStatus(g.items) === 'PARTIAL'; });
  var pending = pendingGroups.length;
  var success = successGroups.length;
  var partial = partialGroups.length;
  var totalIssueQty = normal.reduce(function(sum, row) { return sum + getNum(row['Issue Qty']); }, 0);
  var returnCount = requests.filter(function(row) { return isReturnRow(row); }).length;

  outSetText('outTotalCount', normalGroups.length);
  outSetText('outPendingCount', pending);
  outSetText('outSuccessCount', success);
  outSetText('outTotalIssueQty', totalIssueQty);

  var returnTab = outEl('outReturnTab');
  if (returnTab) returnTab.textContent = returnCount > 0 ? ('Return (' + returnCount + ')') : 'Return';
  var partialTab = outEl('outPendingPartialTab');
  if (partialTab) partialTab.textContent = partial > 0 ? ('Partial (' + partial + ')') : 'Partial';

  var badge = outEl('outNotifBadge');
  if (badge) {
    if (pending > 0) {
      badge.textContent = pending > 99 ? '99+' : String(pending);
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  renderOutNotifPanelList(pendingGroups);
}

function bindOutwardTableEvents() {
  var tbody = outEl('outwardTableBody');
  if (!tbody || tbody.getAttribute('data-outward-events-bound')) return;

  tbody.addEventListener('click', function(e) {
    var editBtn = outClosest(e.target, '[data-action="edit-group"]');
    if (editBtn && tbody.contains(editBtn)) {
      e.preventDefault();
      e.stopPropagation();
      openOutwardGroupEdit(editBtn.getAttribute('data-txn-id'));
      return;
    }

    var deleteBtn = outClosest(e.target, '[data-action="delete-transaction"]');
    if (deleteBtn && tbody.contains(deleteBtn)) {
      e.preventDefault();
      e.stopPropagation();
      confirmDeleteOutwardTransaction(deleteBtn.getAttribute('data-txn-id'));
      return;
    }

    var cell = outClosest(e.target, '.outward-txn-expand-cell');
    if (cell && tbody.contains(cell)) {
      e.preventDefault();
      toggleOutwardGroup(cell.getAttribute('data-txn-id'));
    }
  });

  tbody.setAttribute('data-outward-events-bound', '1');
}

    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Yes, Delete',
    cancelButtonText: 'Cancel',
    confirmButtonColor: '#dc2626'
  }).then(function(result) {
    if (result.isConfirmed) {
      proceedDeleteOutwardTransaction(txnId);
    }
  });
}

function proceedDeleteOutwardTransaction(txnId) {
  if (!window.google || !google.script || !google.script.run) {
    Swal.fire('Error', 'Apps Script connection not available', 'error');
    return;
  }

  outShowLoading(true);
  google.script.run
    .withSuccessHandler(function(response) {
      outShowLoading(false);
      window.outwardRequests = (response && response.requests) || window.outwardRequests || [];
      if (typeof setOutwardMasterData === 'function') {
        setOutwardMasterData((response && response.masterData) || window.outwardMasterData || []);
      }
      renderOutwardStats();
      renderOutwardTable();
      Swal.fire({
        toast: true,
        position: 'bottom-end',
        icon: 'success',
        title: (response && response.message) || 'Transaction deleted.',
        showConfirmButton: false,
        timer: 2500,
        timerProgressBar: true
      });
    })
    .withFailureHandler(function(error) {
      outShowLoading(false);
      Swal.fire('Error', 'Delete failed: ' + ((error && error.message) || error), 'error');
    })
    .deleteOutwardTransaction(txnId);
}

function openOutwardGroupEdit(transactionId, keepModal) {
  ensureOutwardGroupEditModal();

  if (window.outwardPendingSaveError) {
    var errInfo = window.outwardPendingSaveError;
    window.outwardPendingSaveError = null;
    Swal.fire('Previous Save Incomplete', 'Data processing incomplete for ' + (errInfo.txnId || 'the last transaction') + '. Please try again.' + (errInfo.message ? '\n(' + errInfo.message + ')' : ''), 'warning');
  }

  var key = String(transactionId || '');
  var requests = Array.isArray(window.outwardRequests) ? window.outwardRequests : [];

  var items = requests.filter(function(row) {
    // 同じグループのアイテムかどうか
    var groupMatch = getOutwardGroupKey(row) === key;
    if (!groupMatch) return false;

}

function bindOutwardMaterialSuggests(index) {
  var map = [
    { id: 'grpMainGroup_' + index, type: 'mainGroup' },
    { id: 'grpSubGroup_' + index, type: 'subGroup' },
    { id: 'grpBrand_' + index, type: 'brand' },
    { id: 'grpItemName_' + index, type: 'itemName' }
  ];

  map.forEach(function(item) {
    var input = outEl(item.id);
    if (!input || input.getAttribute('data-suggest-bound')) return;

    input.addEventListener('focus', function() { showOutwardSuggest(index, item.type); });
    input.addEventListener('click', function() { showOutwardSuggest(index, item.type); });
    input.addEventListener('input', function() {
      if (item.type === 'mainGroup') {
        outSetValue('grpSubGroup_' + index, '');
        outSetValue('grpBrand_' + index, '');
        outSetValue('grpItemName_' + index, '');
        outSetValue('grpGoodsType_' + index, '');
        outSetValue('grpUom_' + index, '');
        outSetValue('grpModel_' + index, '');
      }
      if (item.type === 'subGroup') {
        outSetValue('grpBrand_' + index, '');
        outSetValue('grpItemName_' + index, '');
        outSetValue('grpGoodsType_' + index, '');
        outSetValue('grpUom_' + index, '');
        outSetValue('grpModel_' + index, '');
      }
      if (item.type === 'brand') {
        outSetValue('grpItemName_' + index, '');
        outSetValue('grpGoodsType_' + index, '');
        outSetValue('grpUom_' + index, '');
        outSetValue('grpModel_' + index, '');
      }
      if (item.type === 'itemName') outApplyMaterialSelection(index, false);
      showOutwardSuggest(index, item.type);
    });
    input.addEventListener('blur', function() {
      setTimeout(function() { closeOutwardSuggest(item.id); }, 180);
    });
    input.setAttribute('data-suggest-bound', 'yes');
  });
}

function getOutwardSuggestValues(index, type) {
  var rows = window.outwardMasterData || [];
  var mainGroup = outGetValue('grpMainGroup_' + index);
  var subGroup = outGetValue('grpSubGroup_' + index);
  var brand = outGetValue('grpBrand_' + index);

  var filtered = rows.filter(function(row) {
    if (type !== 'mainGroup' && mainGroup && outNorm(row.mainGroup) !== outNorm(mainGroup)) return false;
    if ((type === 'brand' || type === 'itemName') && subGroup && outNorm(row.subGroup) !== outNorm(subGroup)) return false;
    if (type === 'itemName' && brand && outNorm(row.brand) !== outNorm(brand)) return false;
    return true;
  });

  if (type === 'mainGroup') return uniq(rows.map(function(row) { return row.mainGroup; }));
  if (type === 'subGroup') return uniq(filtered.map(function(row) { return row.subGroup; }));
  if (type === 'brand') return uniq(filtered.map(function(row) { return row.brand; }));
  return uniq(filtered.map(function(row) { return row.itemName; }));
}

function showOutwardSuggest(index, type) {
  var id = type === 'mainGroup' ? 'grpMainGroup_' + index :
    type === 'subGroup' ? 'grpSubGroup_' + index :
    type === 'brand' ? 'grpBrand_' + index : 'grpItemName_' + index;
  var input = outEl(id);
  var list = outEl(id + '_list');
  if (!input || !list) return;

  var search = outNorm(input.value);
  var values = getOutwardSuggestValues(index, type).filter(function(value) {
    return !search || outNorm(value).indexOf(search) !== -1;
  });

  if (!values.length) {
    list.innerHTML = '<div class="out-suggest-empty">No match found</div>';
  } else {
    list.innerHTML = values.slice(0, 150).map(function(value) {
      return '<div class="out-suggest-option" data-value="' + escAttr(value) + '">' + outEsc(value) + '</div>';
    }).join('');
  }

  list.classList.add('open');
  Array.prototype.forEach.call(list.querySelectorAll('.out-suggest-option'), function(option) {
    option.onclick = function() {
      var value = option.getAttribute('data-value') || '';
      input.value = value;
      list.classList.remove('open');
      if (type === 'mainGroup') {
        outSetValue('grpSubGroup_' + index, '');
        outSetValue('grpBrand_' + index, '');
        outSetValue('grpItemName_' + index, '');
      }
      if (type === 'subGroup') {
        outSetValue('grpBrand_' + index, '');
        outSetValue('grpItemName_' + index, '');
      }
      if (type === 'brand') {
        outSetValue('grpItemName_' + index, '');
      }
      outApplyMaterialSelection(index, true);
    };
  });
}

function closeOutwardSuggest(id) {
  var list = outEl(id + '_list');
  if (list) list.classList.remove('open');
}

function outFindSelectedMaterial(index) {
  var mainGroup = outGetValue('grpMainGroup_' + index);
  var subGroup = outGetValue('grpSubGroup_' + index);
  var brand = outGetValue('grpBrand_' + index);
  var itemName = outGetValue('grpItemName_' + index);

  return (window.outwardMasterData || []).find(function(row) {
    return outNorm(row.mainGroup) === outNorm(mainGroup) &&
      outNorm(row.subGroup) === outNorm(subGroup) &&
      outNorm(row.brand) === outNorm(brand) &&
      outNorm(row.itemName) === outNorm(itemName);
  }) || null;
}

function outApplyMaterialSelection(index, notify) {
  var selected = outFindSelectedMaterial(index);
  if (selected) {
    outSetValue('grpGoodsType_' + index, selected.goodsType || '');
    outSetValue('grpUom_' + index, selected.uom || '');
    outSetValue('grpModel_' + index, selected.model || 'Not Available');
    return true;
  }

  var mainGroup = outGetValue('grpMainGroup_' + index);
  var subGroup = outGetValue('grpSubGroup_' + index);
  var brand = outGetValue('grpBrand_' + index);
  var itemName = outGetValue('grpItemName_' + index);

  var filtered = (window.outwardMasterData || []).filter(function(row) {
    if (mainGroup && outNorm(row.mainGroup) !== outNorm(mainGroup)) return false;
    if (subGroup && outNorm(row.subGroup) !== outNorm(subGroup)) return false;
    if (brand && outNorm(row.brand) !== outNorm(brand)) return false;
    if (itemName && outNorm(row.itemName) !== outNorm(itemName)) return false;
    return true;
  });

  if (filtered.length === 1) {
    outSetValue('grpGoodsType_' + index, filtered[0].goodsType || '');
    outSetValue('grpUom_' + index, filtered[0].uom || '');
    outSetValue('grpModel_' + index, filtered[0].model || 'Not Available');
    return true;
  }

  if (itemName) {
    outSetValue('grpGoodsType_' + index, '');
    outSetValue('grpUom_' + index, '');
    outSetValue('grpModel_' + index, '');
  }
  return false;
}

function markOutwardItemDelete(index) {
  var hidden = outEl('grpDelete_' + index);
  var row = hidden ? outClosest(hidden, 'tr') : null;
  if (!hidden || !row) return;
  var current = hidden.value === 'YES';

    if (addBtn && modal.contains(addBtn)) {
      addOutwardNewItemRow();
      return;
    }
    var saveBtn = outClosest(e.target, '[data-action="save-outward-add"]');
    if (saveBtn && modal.contains(saveBtn)) {
      saveOutwardAddTransaction();
      return;
    }
    var removeBtn = outClosest(e.target, '[data-action="remove-outward-new-item"]');
    if (removeBtn && modal.contains(removeBtn)) {
      var row = outClosest(removeBtn, 'tr');
      if (row) row.remove();
      return;
    }
    var selectAllBtn = outClosest(e.target, '[data-action="nat-select-all"]');
    if (selectAllBtn && modal.contains(selectAllBtn)) {
      natSelectAll();
      return;
    }
    var selectNoneBtn = outClosest(e.target, '[data-action="nat-select-none"]');
    if (selectNoneBtn && modal.contains(selectNoneBtn)) {
      natSelectNone();
      return;
    }
    var assignDcMiBtn = outClosest(e.target, '[data-action="nat-assign-dcmi"]');
    if (assignDcMiBtn && modal.contains(assignDcMiBtn)) {
      applyNatBulkDcMi();
      return;
    }
    var applyStatusBtn = outClosest(e.target, '[data-action="nat-apply-status"]');
    if (applyStatusBtn && modal.contains(applyStatusBtn)) {
      applyNatBulkStatus();
      return;
    }
    var clearBtn = outClosest(e.target, '.out-clear-btn');
    if (clearBtn && modal.contains(clearBtn)) {
      var ctrl = clearBtn.previousElementSibling;
      if (ctrl && (ctrl.tagName === 'INPUT' || ctrl.tagName === 'SELECT')) {
        ctrl.value = '';
        ctrl.dispatchEvent(new Event('input', { bubbles: true }));
        ctrl.dispatchEvent(new Event('change', { bubbles: true }));
        ctrl.focus();
      }
      clearBtn.style.display = 'none';
      return;
    }
  });

  modal.addEventListener('input', function(e) { natRefreshClearBtn(e.target); });
  modal.addEventListener('change', function(e) { natRefreshClearBtn(e.target); });

  document.body.appendChild(modal);
}

function natRefreshClearBtn(field) {
  if (!field || (field.tagName !== 'INPUT' && field.tagName !== 'SELECT')) return;
  var btn = field.nextElementSibling;
  if (btn && btn.classList && btn.classList.contains('out-clear-btn')) {
    btn.style.display = field.value ? 'inline-flex' : 'none';
  }
}

function natSelectAll() {
  var boxes = document.querySelectorAll('#natItemsBody .nat-item-check');

}

function natSelectNone() {
  var boxes = document.querySelectorAll('#natItemsBody .nat-item-check');
  Array.prototype.forEach.call(boxes, function(cb) { cb.checked = false; });
}

function getNatCheckedIndexes() {
  var out = [];
  var boxes = document.querySelectorAll('#natItemsBody .nat-item-check:checked');
  Array.prototype.forEach.call(boxes, function(cb) { out.push(cb.getAttribute('data-nat-index')); });
  return out;
}

function applyNatBulkDcMi() {

  if (!value) { Swal.fire('Missing Value', 'DC / MI value likho.', 'warning'); return; }
  indexes.forEach(function(index) { outSetValue('natDcMi_' + index, value); });

}

function applyNatBulkStatus() {

function natSuggestInputHtml(id, value, placeholder) {

}

function natCtrl(innerHtml, hasValue) {
  return '<span class="out-field-ctrl">' + innerHtml +
    '<button type="button" class="out-clear-btn" tabindex="-1" style="display:' + (hasValue ? 'inline-flex' : 'none') + ';">&times;</button>' +
  '</span>';
}

function bindNatMaterialSuggests(index) {
  var map = [
    { id: 'natMainGroup_' + index, type: 'mainGroup' },
    { id: 'natSubGroup_' + index, type: 'subGroup' },
    { id: 'natBrand_' + index, type: 'brand' },
    { id: 'natItemName_' + index, type: 'itemName' }
  ];

  map.forEach(function(item) {
    var input = outEl(item.id);
    if (!input || input.getAttribute('data-suggest-bound')) return;

    input.addEventListener('focus', function() { showNatSuggest(index, item.type); });
    input.addEventListener('click', function() { showNatSuggest(index, item.type); });
    input.addEventListener('input', function() {
      if (item.type === 'mainGroup') {
        outSetValue('natSubGroup_' + index, '');
        outSetValue('natBrand_' + index, '');
        outSetValue('natItemName_' + index, '');
        outSetValue('natGoodsType_' + index, '');
        outSetValue('natUom_' + index, '');
        outSetValue('natModel_' + index, '');
      }
      if (item.type === 'subGroup') {
        outSetValue('natBrand_' + index, '');
        outSetValue('natItemName_' + index, '');
        outSetValue('natGoodsType_' + index, '');
        outSetValue('natUom_' + index, '');
        outSetValue('natModel_' + index, '');
      }
      if (item.type === 'brand') {
        outSetValue('natItemName_' + index, '');
        outSetValue('natGoodsType_' + index, '');
        outSetValue('natUom_' + index, '');
        outSetValue('natModel_' + index, '');
      }
      if (item.type === 'itemName') natApplyMaterialSelection(index);
      showNatSuggest(index, item.type);
    });
    input.addEventListener('blur', function() {
      setTimeout(function() { closeNatSuggest(item.id); }, 180);
    });
    input.setAttribute('data-suggest-bound', 'yes');
  });
}

function getNatSuggestValues(index, type) {
  var rows = window.outwardMasterData || [];
  var mainGroup = outGetValue('natMainGroup_' + index);
  var subGroup = outGetValue('natSubGroup_' + index);
  var brand = outGetValue('natBrand_' + index);

  var filtered = rows.filter(function(row) {
    if (type !== 'mainGroup' && mainGroup && outNorm(row.mainGroup) !== outNorm(mainGroup)) return false;
    if ((type === 'brand' || type === 'itemName') && subGroup && outNorm(row.subGroup) !== outNorm(subGroup)) return false;
    if (type === 'itemName' && brand && outNorm(row.brand) !== outNorm(brand)) return false;
    return true;
  });

  if (type === 'mainGroup') return uniq(rows.map(function(row) { return row.mainGroup; }));
  if (type === 'subGroup') return uniq(filtered.map(function(row) { return row.subGroup; }));
  if (type === 'brand') return uniq(filtered.map(function(row) { return row.brand; }));
  return uniq(filtered.map(function(row) { return row.itemName; }));
}

function showNatSuggest(index, type) {
  var id = type === 'mainGroup' ? 'natMainGroup_' + index :
    type === 'subGroup' ? 'natSubGroup_' + index :
    type === 'brand' ? 'natBrand_' + index : 'natItemName_' + index;
  var input = outEl(id);
  var list = outEl(id + '_list');
  if (!input || !list) return;

  var search = outNorm(input.value);
  var values = getNatSuggestValues(index, type).filter(function(value) {
    return !search || outNorm(value).indexOf(search) !== -1;
  });

  if (!values.length) {
    list.innerHTML = '<div class="out-suggest-empty">No match found</div>';
  } else {
    list.innerHTML = values.slice(0, 150).map(function(value) {
      return '<div class="out-suggest-option" data-value="' + escAttr(value) + '">' + outEsc(value) + '</div>';
    }).join('');
  }

  list.classList.add('open');
  Array.prototype.forEach.call(list.querySelectorAll('.out-suggest-option'), function(option) {
    option.onclick = function() {
      var value = option.getAttribute('data-value') || '';
      input.value = value;
      list.classList.remove('open');
      if (type === 'mainGroup') {
        outSetValue('natSubGroup_' + index, '');
        outSetValue('natBrand_' + index, '');
        outSetValue('natItemName_' + index, '');
      }
      if (type === 'subGroup') {
        outSetValue('natBrand_' + index, '');
        outSetValue('natItemName_' + index, '');
      }
      if (type === 'brand') {
        outSetValue('natItemName_' + index, '');
      }
      natApplyMaterialSelection(index);
    };
  });
}

function closeNatSuggest(id) {
  var list = outEl(id + '_list');
  if (list) list.classList.remove('open');
}

function natFindSelectedMaterial(index) {
  var mainGroup = outGetValue('natMainGroup_' + index);
  var subGroup = outGetValue('natSubGroup_' + index);
  var brand = outGetValue('natBrand_' + index);
  var itemName = outGetValue('natItemName_' + index);

  return (window.outwardMasterData || []).find(function(row) {
    return outNorm(row.mainGroup) === outNorm(mainGroup) &&
      outNorm(row.subGroup) === outNorm(subGroup) &&
      outNorm(row.brand) === outNorm(brand) &&
      outNorm(row.itemName) === outNorm(itemName);
  }) || null;
}

function natApplyMaterialSelection(index) {
  var selected = natFindSelectedMaterial(index);
  if (selected) {
    outSetValue('natGoodsType_' + index, selected.goodsType || '');
    outSetValue('natUom_' + index, selected.uom || '');
    outSetValue('natModel_' + index, selected.model || 'Not Available');
    return true;
  }

  var mainGroup = outGetValue('natMainGroup_' + index);
  var subGroup = outGetValue('natSubGroup_' + index);
  var brand = outGetValue('natBrand_' + index);
  var itemName = outGetValue('natItemName_' + index);

  var filtered = (window.outwardMasterData || []).filter(function(row) {
    if (mainGroup && outNorm(row.mainGroup) !== outNorm(mainGroup)) return false;
    if (subGroup && outNorm(row.subGroup) !== outNorm(subGroup)) return false;
    if (brand && outNorm(row.brand) !== outNorm(brand)) return false;
    if (itemName && outNorm(row.itemName) !== outNorm(itemName)) return false;
    return true;
  });

  if (filtered.length === 1) {
    outSetValue('natGoodsType_' + index, filtered[0].goodsType || '');
    outSetValue('natUom_' + index, filtered[0].uom || '');
    outSetValue('natModel_' + index, filtered[0].model || 'Not Available');
    return true;
  }

  if (itemName) {
    outSetValue('natGoodsType_' + index, '');
    outSetValue('natUom_' + index, '');
    outSetValue('natModel_' + index, '');
  }
  return false;
}

function saveOutwardAddTransaction() {
  var location = outGetValue('natLocation');
  var purpose = outGetValue('natPurpose');
  var headPerson = outGetValue('natHeadPerson');
  var technician = outGetValue('natTechnician');

  if (!location || !purpose || !headPerson) {
    Swal.fire('Missing Info', 'Location, Purpose aur Head Person bharna zaroori hai.', 'warning');
    return;
  }

  var rows = document.querySelectorAll('#natItemsBody tr');
  if (!rows.length) {
    Swal.fire('No Items', 'Kam se kam ek item add karo.', 'warning');
    return;
  }

  var items = [];
  var hasInvalid = false;
  var hasInvalidIssueQty = false;
  var masterIssueDate = outGetValue('natIssueDate');

  rows.forEach(function(row) {
    var index = row.getAttribute('data-nat-index');
    var itemName = outGetValue('natItemName_' + index);
    if (!itemName) return; // khali row skip

    var reqQty = getNum(outGetValue('natReqQty_' + index));
    if (!reqQty || reqQty <= 0) hasInvalid = true;

    var issueQty = getNum(outGetValue('natIssueQty_' + index));
    if (!issueQty || issueQty <= 0) hasInvalidIssueQty = true;

    items.push({
      mainGroup: outGetValue('natMainGroup_' + index),
      subGroup: outGetValue('natSubGroup_' + index),
      brand: outGetValue('natBrand_' + index),
      itemName: itemName,
      goodsType: outGetValue('natGoodsType_' + index),
      uom: outGetValue('natUom_' + index),
      model: outGetValue('natModel_' + index),
      quantity: reqQty,
      issueQty: issueQty,
      issueDate: masterIssueDate,
      issueFrom: outGetValue('natIssueFrom_' + index),
      stockType: outGetValue('natStockType_' + index),
      serialNumber: outGetValue('natSerial_' + index),
      dcMi: outGetValue('natDcMi_' + index),
      status: outGetValue('natStatus_' + index) || 'PENDING'
    });
  });

  if (!items.length) {
    Swal.fire('No Items', 'Kam se kam ek item me Goods Description select karo.', 'warning');
    return;
  }

  if (hasInvalidIssueQty) {
    Swal.fire('Check Issue Qty', 'Har item ki Issue Qty compulsory hai aur 0 se zyada honi chahiye.', 'warning');
    return;
  }

  if (hasInvalid) {
    Swal.fire('Check Qty', 'Har item ki Req Qty 0 se zyada honi chahiye.', 'warning');
    return;
  }

  if (!window.google || !google.script || !google.script.run) {
    Swal.fire('Error', 'Apps Script connection not available', 'error');
    return;
  }

  var saveBtn = outEl('saveOutwardAddBtn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = 'Saving...'; }

  google.script.run
    .withSuccessHandler(function(response) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = 'Create Transaction'; }
      closeOutwardAddTransactionModal();

      window.outwardRequests = (response && response.requests) || window.outwardRequests || [];
      if (typeof setOutwardMasterData === 'function') {
        setOutwardMasterData((response && response.masterData) || window.outwardMasterData || []);
      }
      if (typeof ensureOutwardExtraTabs === 'function') ensureOutwardExtraTabs();
      if (typeof renderOutwardStats === 'function') renderOutwardStats();
      if (typeof renderOutwardTable === 'function') renderOutwardTable();

      Swal.fire({
        toast: true,
        position: 'bottom-end',
        icon: 'success',
        title: (response && response.message) || 'Transaction created successfully.',
        showConfirmButton: false,
        timer: 2800,
        timerProgressBar: true
      });
    })
    .withFailureHandler(function(error) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = 'Create Transaction'; }
      Swal.fire('Error', 'Transaction create failed: ' + ((error && error.message) || error), 'error');
    })
    .createOutwardTransaction({
      location: location,
      purpose: purpose,
      headPerson: headPerson,
      technician: technician,
      items: items
    });
}

function saveOutwardGroupEdit() {
  var txnId = outGetValue('outGroupTransactionId');
  var rows = document.querySelectorAll('#outGroupEditBody tr');
  if (!txnId || !rows.length) {
    Swal.fire('Error', 'No items to update', 'error');
    return;
  }

  var items = [];
  var invalid = null;
  var deleteCount = 0;
  var masterIssueDate = outGetValue('grpMasterIssueDate');

  Array.prototype.forEach.call(rows, function(row) {
    var index = Number(row.getAttribute('data-row-index'));
    var deleteRow = outGetValue('grpDelete_' + index) === 'YES';
    if (deleteRow) deleteCount++;

    var reqQty = outGetValue('grpReqQty_' + index);
    var issueQty = outGetValue('grpIssueQty_' + index);
    var mainGroup = outGetValue('grpMainGroup_' + index);
    var subGroup = outGetValue('grpSubGroup_' + index);
    var brand = outGetValue('grpBrand_' + index);
    var itemName = outGetValue('grpItemName_' + index);
    var goodsType = outGetValue('grpGoodsType_' + index);
    var uom = outGetValue('grpUom_' + index);

    if (!deleteRow) {
      if (!mainGroup) invalid = 'Main Group required hai.';
      else if (!subGroup) invalid = 'Sub Group required hai.';
      else if (!itemName) invalid = 'Goods Description required hai.';
      else if (!goodsType || !uom) invalid = 'Material List se valid item select karein. Goods Type aur UOM autofill hona chahiye.';
      else if (reqQty !== '' && Number(reqQty) < 0) invalid = 'Req Qty negative nahi ho sakti.';
      else if (!issueQty || Number(issueQty) <= 0) invalid = 'Issue Qty compulsory hai aur 0 se zyada honi chahiye.';
    }

    items.push({
      rowNumber: row.getAttribute('data-row-number'),
      deleteRow: deleteRow,
      goodsType: goodsType,
      mainGroup: mainGroup,
      subGroup: subGroup,
      brand: brand,
      itemName: itemName,
      uom: uom,
      model: outGetValue('grpModel_' + index),
      quantity: reqQty,
      issueQty: issueQty,
      issueDate: masterIssueDate,
      issueFrom: outGetValue('grpIssueFrom_' + index),
      stockType: outGetValue('grpStockType_' + index),
      serialNumber: outGetValue('grpSerial_' + index),
      dcMi: outGetValue('grpDcMi_' + index),
      status: outGetValue('grpStatus_' + index)
    });
  });

  if (invalid) {
    Swal.fire('Validation Error', invalid, 'error');
    return;
  }

  if (deleteCount && deleteCount === rows.length) {
    Swal.fire({
      title: 'Delete All Items?',
      text: 'Is transaction ke sabhi items delete ho jayenge.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Yes, Delete',
      cancelButtonText: 'Cancel'
    }).then((result) => {
      if (result.isConfirmed) proceedSaveOutwardGroupEditBackground(txnId, items);
    });
    return;
  } else if (deleteCount) {
    Swal.fire({
      title: 'Delete ' + deleteCount + ' Item(s)?',
      text: deleteCount + ' item delete mark hai. Save karne par sheet se delete ho jayega.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Yes, Delete',
      cancelButtonText: 'Cancel'
    }).then((result) => {
      if (result.isConfirmed) proceedSaveOutwardGroupEditBackground(txnId, items);
    });
    return;
  }

  proceedSaveOutwardGroupEditBackground(txnId, items);
}

function proceedSaveOutwardGroupEditBackground(txnId, items) {
  // Page turant band, save background me chalega
  closeOutwardGroupEditModal();

  Swal.fire({
    toast: true,
    position: 'bottom-end',
    icon: 'info',
    title: 'Saving in background...',
    showConfirmButton: false,
    timer: 2200,
    timerProgressBar: true
  });

  if (!window.google || !google.script || !google.script.run) {
    window.outwardPendingSaveError = { txnId: txnId, message: 'Apps Script connection not available' };
    return;
  }

  google.script.run
    .withSuccessHandler(function(response) {
      window.outwardRequests = (response && response.requests) || window.outwardRequests || [];
      if (typeof setOutwardMasterData === 'function') {
        setOutwardMasterData((response && (response.masterData || response.materialRows)) || window.outwardMasterData || []);
      }
      ensureOutwardExtraTabs();
      renderOutwardStats();
      renderOutwardTable();

      Swal.fire({
        toast: true,
        position: 'bottom-end',
        icon: 'success',
        title: (response && response.message) || 'Data saved successfully.',
        showConfirmButton: false,
        timer: 2500,
        timerProgressBar: true
      });
    })
    .withFailureHandler(function(error) {
      window.outwardPendingSaveError = { txnId: txnId, message: (error && error.message) || String(error) };
      Swal.fire({
        toast: true,
        position: 'bottom-end',
        icon: 'error',
        title: 'Save failed for ' + txnId + '. Aap agli baar kisi bhi transaction ko select karenge to alert milega.',
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true
      });
    })
    .updateOutwardGroupIssue({ transactionId: txnId, items: items });
}
/* ---------------- Single row edit compatibility ---------------- */
function openOutwardEdit(rowNumber) {
  var requests = Array.isArray(window.outwardRequests) ? window.outwardRequests : [];
  var row = requests.find(function(item) { return Number(item.rowNumber) === Number(rowNumber); });
  if (!row) return alert('Row not found');
  openOutwardGroupEdit(getOutwardGroupKey(row));
}

function closeOutwardModal() {
  var modal = outEl('outwardModal');
  if (modal) modal.style.display = 'none';
}

function saveOutwardIssue() {
  var payload = {
    rowNumber: outGetValue('outEditRowNumber'),
    issueQty: outGetValue('outEditIssueQty'),
    issueDate: outGetValue('outEditIssueDate'),
    issueFrom: outGetValue('outEditIssueFrom'),
    stockType: outGetValue('outEditStockType'),
    brand: outGetValue('outEditBrand'),
    serialNumber: outGetValue('outEditSerialNumber'),
    dcMi: outGetValue('outEditDcMi')
  };

  if (!payload.issueQty) return alert('Issue Qty enter karein');
  if (!payload.stockType) return alert('Stock Type select karein');
  if (!window.google || !google.script || !google.script.run) return alert('Apps Script connection not available');

  outShowLoading(true);
  google.script.run
    .withSuccessHandler(function(response) {
      outShowLoading(false);
      alert((response && response.message) || 'Updated');
      closeOutwardModal();
      window.outwardRequests = (response && response.requests) || window.outwardRequests || [];
      renderOutwardStats();
      renderOutwardTable();
    })
    .withFailureHandler(function(error) {
      outShowLoading(false);
      alert('Update failed: ' + ((error && error.message) || error));
    })
    .updateOutwardIssue(payload);
}
</script>
