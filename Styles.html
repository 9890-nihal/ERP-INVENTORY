<style>
    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --sidebar: #0f172a;
      --sidebar-light: #1e293b;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3a8a, #0f172a);
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .login-box h1 {
      margin: 0;
      text-align: center;
      color: var(--primary);
    }

    .login-box p {
      text-align: center;
      color: var(--muted);
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 44px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,64,175,0.12);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .btn {
      border: none;
      border-radius: 9px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .w-100 {
      width: 100%;
    }

    .error-msg {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .demo {
      margin-top: 15px;
      background: #f9fafb;
      color: var(--muted);
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      font-size: 13px;
    }

    .app {
      display: none;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: var(--sidebar);
      color: #fff;
      padding-top: 20px;
      z-index: 20;
    }

    .brand {
      padding: 0 22px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .brand h2 {
      margin: 0;
    }

    .brand span {
      color: #cbd5e1;
      font-size: 12px;
    }

    .menu {
      margin-top: 18px;
    }

    .menu-item {
      padding: 14px 22px;
      color: #cbd5e1;
      border-left: 4px solid transparent;
      cursor: pointer;
    }

    .menu-item.active {
      background: var(--sidebar-light);
      color: #fff;
      border-left-color: #60a5fa;
    }

    .main {
      margin-left: 250px;
      min-height: 100vh;
    }

    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topbar h3 {
      margin: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      padding: 24px;
    }

    .loading {
  display: none !important;
}

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .chip {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04);
    }

    .chip span {
      color: var(--muted);
      font-size: 13px;
    }

    .chip h2 {
      margin: 8px 0 0;
      font-size: 28px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04);
      overflow: hidden;
      margin-bottom: 22px;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-header h3 {
      margin: 0;
    }

    .form-body {
      padding: 20px;
    }

    .note {
      background: #fff7ed;
      color: #9a3412;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .span-2 {
      grid-column: span 2;
    }

    .span-4 {
      grid-column: span 4;
    }

    .readonly {
      background: #f9fafb;
      color: #374151;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      width: 220px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: transparent;
      border: none;
      padding: 12px 16px;
      font-weight: 700;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      cursor: pointer;
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1500px;
      border-collapse: collapse;
    }

    th {
      background: #f9fafb;
      padding: 12px;
      font-size: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:hover {
      background: #f9fafb;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-success {
      background: #dcfce7;
      color: #166534;
    }

    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 35px;
      color: var(--muted);
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      z-index: 99;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal {
      background: #fff;
      width: 100%;
      max-width: 760px;
      max-height: 92vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-header h3 {
      margin: 0;
    }

    .close-btn {
      width: 35px;
      height: 35px;
      border: none;
      border-radius: 50%;
      background: #f3f4f6;
      font-size: 20px;
      cursor: pointer;
    }

    /* =========================
       ERP PRO UI POLISH
    ========================= */
    body {
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
    }

    .sidebar {
      background: linear-gradient(180deg, #0b1220 0%, #111827 55%, #172033 100%);
      box-shadow: 12px 0 35px rgba(15, 23, 42, 0.16);
    }

    .brand h2 {
      letter-spacing: 0.04em;
    }

    .menu-item {
      margin: 4px 12px;
      border-radius: 12px;
      border-left: 0;
      transition: 0.18s ease;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      transform: translateX(2px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, rgba(37,99,235,0.95), rgba(30,64,175,0.82));
      border-left-color: transparent;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.28);
    }

    .topbar {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .topbar h3 {
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .chip,
    .panel,
    .login-box,
    .modal {
      border: 1px solid rgba(226, 232, 240, 0.92);
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }

    .chip {
      position: relative;
      overflow: hidden;
    }

    .chip::after {
      content: "";
      position: absolute;
      right: -32px;
      top: -32px;
      width: 90px;
      height: 90px;
      border-radius: 999px;
      background: rgba(37,99,235,0.08);
    }

    .chip h2 {
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .panel-header {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    th {
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 11px;
    }

    td {
      color: #334155;
    }

    .btn {
      transition: 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15,23,42,0.10);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    .btn-outline {
      border-color: #2563eb;
      color: #1d4ed8;
      background: #ffffff;
    }

    .modal {
      max-width: 820px;
    }

    .modal-header {
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    input,
    select,
    textarea {
      border-color: #dbe3ef;
      transition: 0.18s ease;
    }


    @media (max-width: 1100px) {
      .chip-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .span-2,
      .span-4 {
        grid-column: span 2;
      }
    }

    @media (max-width: 900px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .main {
        margin-left: 0;
      }

      .topbar {
        height: auto;
        padding: 15px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }

    @media (max-width: 600px) {
      .chip-grid,
      .grid {
        grid-template-columns: 1fr;
      }

      .span-2,
      .span-4 {
        grid-column: span 1;
      }

      .actions {
        flex-direction: column;
      }

      .filters input,
      .filters select {
        width: 100%;
      }
    }
  

    .inventory-hero {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #ffffff, #eef6ff);
    }

    .inventory-hero h3 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .inventory-period-box {
      min-width: 280px;
      display: grid;
      gap: 8px;
    }

    .inventory-chip-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .inventory-filters input,
    .inventory-filters select {
      width: 210px;
    }

    .inventory-table-wrap {
      max-height: 68vh;
      overflow: auto;
    }

    .inventory-table {
      min-width: 2850px;
      border-collapse: collapse;
    }

    .inventory-table th {
      text-align: center;
      vertical-align: middle;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .inventory-table thead tr:first-child th {
      top: 0;
      z-index: 3;
    }

    .inventory-table thead tr:nth-child(2) th {
      top: 41px;
    }

    .group-head {
      background: #dbeafe !important;
      color: #0f172a;
      border: 1px solid #94a3b8;
      font-weight: 800;
    }

    .master-head {
      background: #e0f2fe !important;
    }

    .current-head {
      background: #fde68a !important;
    }

    .reorder-head {
      background: #fed7aa !important;
    }

    .cell-num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .stock-negative {
      color: #991b1b;
      font-weight: 800;
      background: #fee2e2;
    }

    .row-warning td {
      background: #fff7ed;
    }

    .location-editor {
      display: flex;
      gap: 8px;
      min-width: 260px;
      align-items: center;
    }

    .location-editor input {
      min-width: 170px;
      padding: 8px 10px;
    }

    .btn-sm {
      padding: 8px 10px;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .inventory-chip-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }



    /* =========================
       REPORTS CORPORATE MENU
    ========================= */
    .menu-section-label {
      margin: 16px 22px 8px;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .menu-parent {
      justify-content: flex-start;
    }

    .menu-arrow {
      margin-left: auto;
      font-weight: 900;
      color: #bfdbfe;
      transition: transform 0.18s ease;
    }

    .submenu {
      display: none;
      margin: 4px 12px 10px 38px;
      padding: 6px;
      border-left: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.36);
      border-radius: 14px;
    }

    .submenu.open {
      display: block;
      animation: submenuFade 0.18s ease;
    }

    @keyframes submenuFade {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .submenu-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      color: #cbd5e1;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: 0.18s ease;
    }

    .submenu-item:hover {
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      transform: translateX(2px);
    }

    .submenu-item.active {
      background: #ffffff;
      color: #1d4ed8;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.18);
    }

    .submenu-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(37, 99, 235, 0.15);
      color: inherit;
      font-size: 10px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    /* =========================
       REPORTS MODULE UI
    ========================= */
    .reports-hero {
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
    }

    .reports-hero-copy h3 {
      margin: 4px 0 8px;
      font-size: 26px;
      letter-spacing: -0.03em;
      color: #0f172a;
    }

    .eyebrow {
      display: inline-block;
      color: #2563eb;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .reports-hero-status {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .report-option-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .report-option-card {
      text-align: left;
      width: 100%;
      min-height: 175px;
      border: 1px solid #dbe3ef;
      background: #ffffff;
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
      transition: 0.18s ease;
    }

    .report-option-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      border-color: #93c5fd;
    }

    .report-option-card.active {
      border-color: #2563eb;
      background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
      box-shadow: 0 18px 42px rgba(37, 99, 235, 0.18);
    }

    .report-option-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .report-option-id {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .report-option-card h4 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 16px;
    }

    .report-option-card p {
      margin: 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.55;
    }

    .report-workspace {
      padding: 0;
    }

    .report-workspace-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding: 22px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .report-workspace-header h3 {
      margin: 4px 0 6px;
      font-size: 22px;
      color: #0f172a;
    }

    .report-actions {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .report-blueprint-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px 22px;
    }

    .report-blueprint-card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      background: #ffffff;
    }

    .report-blueprint-card span {
      color: #64748b;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .report-blueprint-card p {
      margin: 8px 0 0;
      color: #0f172a;
      font-weight: 800;
      line-height: 1.45;
    }

    .report-preview-box {
      margin: 0 22px 22px;
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      background: #ffffff;
      overflow: hidden;
    }

    .report-preview-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
    }

    .report-preview-header h4 {
      margin: 0;
      color: #0f172a;
    }

    .report-column-tags {
      padding: 16px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .report-column-tags span {
      padding: 8px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e3a8a;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid #dbeafe;
    }

    @media (max-width: 1200px) {
      .report-option-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .report-option-grid,
      .report-blueprint-grid {
        grid-template-columns: 1fr;
      }

      .reports-hero-status,
      .report-actions {
        justify-content: flex-start;
      }
    }
